worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        off;
    keepalive_timeout 65;
    client_max_body_size 50m;

    gzip off;

    upstream backend {
        server backend:3001;
    }

    upstream frontend {
        server frontend:80;
    }

    upstream bi-frontend {
        server 172.22.0.3:80;
    }

    upstream bi-backend {
        server 172.22.0.2:4000;
    }

    upstream braincup {
        server braincup:80;
    }

    server {
        listen 80;
        server_name _;

        # ── Braincup ──
        location /braincup/ {
            proxy_pass http://braincup/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            add_header Cache-Control "no-store";
        }

        # ── BI API proxy (must come before /bi/ to avoid prefix conflict) ──
        location /bi/api/ {
            rewrite ^/bi/api/(.*)$ /api/$1 break;
            proxy_pass http://bi-backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
            client_max_body_size 30m;
        }

        # ── BI frontend proxy ──
        location /bi/ {
            proxy_pass http://bi-frontend/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffering off;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            sub_filter_once off;
        }

        # ── Main ShiftSync API ──
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # ── Main ShiftSync frontend ──
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffering off;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }
    }
}
