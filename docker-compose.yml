version: "3.9"

services:
  backend:
    build: ./backend
    container_name: shiftsync-api
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backend/data:/app/data
      - bi-data:/bi-data
    networks:
      - shiftsync-net
    depends_on: []
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: shiftsync-ui
    restart: unless-stopped
    networks:
      - shiftsync-net
    depends_on:
      - backend


  nginx:
    image: nginx:alpine
    container_name: shiftsync-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - shiftsync-net
    depends_on:
      - frontend
      - backend

networks:
  shiftsync-net:
    driver: bridge

volumes:
  # External: the shiftsync-bi database volume (read by Indicadores Pessoais)
  bi-data:
    external: true
    name: shiftsync-bi_bi-data
